set -g mouse on
set -g prefix C-s
set -g status on
set -g base-index 1
set -g pane-base-index 1

# Разрешить проброс escape-последовательностей (необходимо для Kitty протокола)
set -g allow-passthrough on

# Отключить визуальные уведомления (строго рекомендуется)
# Всплывающие уведомления активности tmux могут прерывать escape-коды и ломать отрисовку
set -g visual-activity off

if-shell '[[ $(uname) = Darwin ]]' {
  bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
  bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
} {
  bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -sel clip"
}

set -g default-terminal "tmux-256color"
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

run ~/.tmux_plugins/catppuccin/catppuccin.tmux

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# Переместить текущее окно влево
bind-key C-S-Left swap-window -t -1\; select-window -t -1
# Переместить текущее окно вправо
bind-key C-S-Right swap-window -t +1\; select-window -t +1

# run ~/.config/tmux/plugins/tmux-plugins/tmux-cpu/cpu.tmux
# run ~/.config/tmux/plugins/tmux-plugins/tmux-battery/battery.tmux