set -g mouse on
set -g prefix C-s
# Двойное нажатие Ctrl+S отправляет сам prefix (C-s) в приложение.
bind C-s send-prefix
set -g status on
set -g base-index 1
set -g pane-base-index 1

# Убрать задержку на Esc (дефолт tmux — 500ms, ломает Esc в vim и т.п.).
set -sg escape-time 10

# ── Super-шорткаты из cage/kitty (без префикса) ───────────────────────────────
# tmux не умеет модификатор Super, поэтому kitty (см. ~/.config/kitty/kitty.cage.conf)
# ловит Super-комбо и шлёт уникальные escape-последовательности, а здесь они
# привязаны к действиям через user-keys + `bind -n` (root-таблица, БЕЗ префикса).
# Работает и с локальным, и с удалённым tmux: kitty просто шлёт байты в tty.
set -s user-keys[0]  "\e[210~"   # Super+o
set -s user-keys[1]  "\e[211~"   # Super+Shift+o
set -s user-keys[2]  "\e[221~"   # Super+1
set -s user-keys[3]  "\e[222~"   # Super+2
set -s user-keys[4]  "\e[223~"   # Super+3
set -s user-keys[5]  "\e[224~"   # Super+4
set -s user-keys[6]  "\e[225~"   # Super+5
set -s user-keys[7]  "\e[226~"   # Super+6
set -s user-keys[8]  "\e[227~"   # Super+7
set -s user-keys[9]  "\e[228~"   # Super+8
set -s user-keys[10] "\e[229~"   # Super+9
set -s user-keys[11] "\e[230~"   # Super+Ctrl+o
set -s user-keys[12] "\e[231~"   # Super+Ctrl+Shift+o
set -s user-keys[13] "\e[232~"   # Super+C
set -s user-keys[14] "\e[241~"   # Super+Alt+1
set -s user-keys[15] "\e[242~"   # Super+Alt+2
set -s user-keys[16] "\e[243~"   # Super+Alt+3
set -s user-keys[17] "\e[244~"   # Super+Alt+4
set -s user-keys[18] "\e[233~"   # Super+N
set -s user-keys[19] "\e[234~"   # Super+P
set -s user-keys[20] "\e[235~"   # Super+Ctrl+N
# o/O — переход по панелям (как prefix o); Ctrl+o/Ctrl+O — rotate (как prefix C-o/M-o);
# 1..9 — окна; N/P — переход по окнам (как prefix n/p); C — новое окно;
# Ctrl+N — новая панель; Alt+1..4 — лейауты.
bind -n User0  select-pane -t :.+
bind -n User1  select-pane -t :.-
bind -n User2  select-window -t 1
bind -n User3  select-window -t 2
bind -n User4  select-window -t 3
bind -n User5  select-window -t 4
bind -n User6  select-window -t 5
bind -n User7  select-window -t 6
bind -n User8  select-window -t 7
bind -n User9  select-window -t 8
bind -n User10 select-window -t 9
bind -n User11 rotate-window -D
bind -n User12 rotate-window -U
bind -n User13 new-window
bind -n User14 select-layout even-horizontal
bind -n User15 select-layout even-vertical
bind -n User16 select-layout main-horizontal
bind -n User17 select-layout main-vertical
bind -n User18 next-window
bind -n User19 previous-window
bind -n User20 split-window

# Разрешить проброс escape-последовательностей (необходимо для Kitty протокола)
set -g allow-passthrough on

# Отключить визуальные уведомления (строго рекомендуется)
# Всплывающие уведомления активности tmux могут прерывать escape-коды и ломать отрисовку
set -g visual-activity off

bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xsel --clipboard --input"
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xsel --clipboard --input"
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xsel --clipboard --input"
bind-key -T copy-mode-vi н send-keys -X copy-pipe-and-cancel "xsel --clipboard --input"  # рус: y→н

set -g default-terminal "tmux-256color"
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Как часто обновляется статус-бар (CPU/память считаются на каждый тик).
set -g status-interval 3

run ~/.tmux_plugins/catppuccin/catppuccin.tmux

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
# CPU и память — самодостаточные powerline-модули из ~/.dotfiles.scripts/tmux-sysstat
# (Linux-only, читает /proc; шапка + иконка + значение целиком красятся по порогу).
# Без -F: #() выполняется живьём при каждом рендере; с -F значение запеклось бы
# один раз при загрузке конфига (пустым). Скрипт сам несёт powerline-шапку,
# поэтому подключаем напрямую, минуя модули catppuccin cpu/ram (завязаны на tmux-cpu).
set -ag status-right "#(~/.dotfiles.scripts/tmux-sysstat cpu)"
set -ag status-right "#(~/.dotfiles.scripts/tmux-sysstat mem)"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# run ~/.config/tmux/plugins/tmux-plugins/tmux-cpu/cpu.tmux
# run ~/.config/tmux/plugins/tmux-plugins/tmux-battery/battery.tmux

# Главная панель в main-vertical занимает 2/3 ширины экрана (в main-horizontal — 2/3 высоты).
set -g main-pane-width 66%
set -g main-pane-height 66%

# ── Бинды панелей/лейаутов (prefix + клавиша) ─────────────────────────────────
# Клавиша в каждом бинде совпадает с подписью в меню «Panes».
bind | split-window -h
bind / split-window -h   # рус: физич. клавиша | (Shift+\) в русской раскладке даёт /
bind - split-window -v   # рус: - на цифровом ряду, раскладкой не меняется
# Добавить панель и переразложить её по текущему лейауту.
bind C-n { split-window ; select-layout }
bind M-1 select-layout even-horizontal
bind M-2 select-layout even-vertical
bind M-3 select-layout main-horizontal
bind M-4 select-layout main-vertical
bind M-5 select-layout tiled
bind C-o rotate-window -D
bind M-o rotate-window -U
bind M-щ rotate-window -U   # рус: Alt+буква уходит символом раскладки (o→щ); C-o — control-кодом, дубль не нужен
# Отправить (join-pane) текущую панель на другое окно; фокус уходит следом.
# select-layout после переноса — чтобы панель встроилась в текущий лейаут окна,
# а не прилипла снизу отдельной полосой (как в bind C-n выше).
bind > { join-pane -t :+ ; select-layout }   # на окно справа (следующее, с заворотом)
bind Ю { join-pane -t :+ ; select-layout }   # рус: > = Shift+точка → Ю
bind < { join-pane -t :- ; select-layout }   # на окно слева (предыдущее, с заворотом)
bind Б { join-pane -t :- ; select-layout }   # рус: < = Shift+запятая → Б
bind g command-prompt -p "На окно №:" { join-pane -t ":%%" ; select-layout }
bind п command-prompt -p "На окно №:" { join-pane -t ":%%" ; select-layout }   # рус: g→п
# z (zoom), Space (next-layout), x (kill-pane) — стандартные дефолтные бинды tmux.

# ── Русская раскладка: дубли дефолтных prefix-биндов ──────────────────────────
# tmux матчит бинд по символу текущей раскладки. В ЙЦУКЕН физическая клавиша
# латинской буквы даёт кириллицу (c→с, d→в, x→ч …), поэтому дублируем сюда все
# дефолтные буквенные/пунктуационные бинды на их кириллический эквивалент.
# НЕ дублируем: цифры (1-9, M-1..5 — на цифровом ряду не меняются), Ctrl-комбо
# (C-o, C-b, C-z — уходят control-кодом независимо от раскладки), а также
# ! % ( ) — их Shift-символы в русской раскладке совпадают с латиницей.
# Команды скопированы дословно из `tmux -f /dev/null list-keys -T prefix`.
# Строчные буквы:
bind с new-window                                  # c
bind в detach-client                               # d
bind а command-prompt { find-window -Z "%%" }      # f
bind ш display-message                             # i
bind д last-window                                 # l
bind ь select-pane -m                              # m
bind т next-window                                 # n
bind щ select-pane -t :.+                          # o
bind з previous-window                             # p
bind й display-panes                               # q
bind к refresh-client                              # r
bind ы choose-tree -Zs                             # s
bind е clock-mode                                  # t
bind ц choose-tree -Zw                             # w
bind ч confirm-before -p "kill-pane #P? (y/n)" kill-pane   # x
bind я resize-pane -Z                              # z
# Заглавные буквы:
bind С customize-mode -Z                           # C
bind В choose-client -Z                            # D
bind У select-layout -E                            # E
bind Д switch-client -l                            # L
bind Ь select-pane -M                              # M
# Пунктуация (латинская клавиша → кириллица той же физической клавиши):
bind х copy-mode                                   # [
bind ъ paste-buffer -p                             # ]
bind ж last-pane                                   # ;
bind э command-prompt -T window-target -p index { select-window -t ":%%" }   # '
bind Х swap-pane -U                                # {
bind Ъ swap-pane -D                                # }
bind Ж command-prompt                              # :
bind Э split-window                                # "
bind Ё show-messages                               # ~
bind б command-prompt -I "#W" { rename-window "%%" }        # ,
bind ю command-prompt -T target { move-window -t "%%" }     # .
# Alt+буква (уходит символом раскладки, поэтому нужен дубль):
bind M-т next-window -a                             # M-n
bind M-з previous-window -a                         # M-p

# ── Меню-бар ──────────────────────────────────────────────────────────────────
# Двухстрочный статус сверху: строка 0 — кликабельный меню-бар,
# строка 1 — обычный catppuccin (список окон + модули).
set -g status 2
set -g status-position top

# Строка 1: стандартный шаблон статуса (рендерит catppuccin). По умолчанию при
# `status 2` вторая строка показывает индексы панелей — переопределяем её.
set -g status-format[1] '#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?window_end_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?window_end_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]'

# Строка 0: меню-бар с кликабельными зонами (#[range=user|...]).
set -g status-format[0] "#[align=left fg=#{@thm_fg} bg=#{@thm_surface_0}]#[range=user|menu_sessions] Sessions #[norange]#[range=user|menu_windows] Windows #[norange]#[range=user|menu_panes] Panes #[norange]#[range=user|menu_system] System #[norange]"

# Стиль выпадающих меню в тон теме.
set -g menu-style          "fg=#{@thm_fg},bg=#{@thm_surface_0}"
set -g menu-selected-style "fg=#{@thm_crust},bg=#{@thm_mauve}"
set -g menu-border-style   "fg=#{@thm_overlay_0}"

# Клик по меню-бару (строка 0) открывает меню; клик по строке 1 — переключает окно.
bind -n MouseDown1Status {
  if -F "#{!=:#{mouse_status_line},0}" {
    select-window -t =
  } {
    if -F "#{==:#{mouse_status_range},menu_sessions}" {
      display-menu -T "#[align=centre] Sessions " -x M -y S \
        "New session"     n "command-prompt -p 'Session name:' { new-session -s '%%' }" \
        "Switch session"  s "choose-tree -Zs" \
        "Rename session"  r "command-prompt -I '#S' { rename-session '%%' }" \
        "" \
        "Detach"          d "detach-client" \
        "Kill session"    X "confirm-before -p 'kill session #S? (y/n)' kill-session"
    } {
    if -F "#{==:#{mouse_status_range},menu_windows}" {
      display-menu -T "#[align=centre] Windows " -x M -y S \
        "New window"      n "new-window" \
        "Next"            . "next-window" \
        "Previous"        , "previous-window" \
        "Rename"          r "command-prompt -I '#W' { rename-window '%%' }" \
        "" \
        "Move window to session…"     m "command-prompt -T target -p 'В сессию:' { move-window -t '%%' }" \
        "Move window to new session…" M "command-prompt -p 'Новая сессия:' { new-session -d -s '%%' ; move-window -t '%%:' }" \
        "" \
        "Kill window"     x "confirm-before -p 'kill window #W? (y/n)' kill-window"
    } {
    if -F "#{==:#{mouse_status_range},menu_panes}" {
      display-menu -T "#[align=centre] Panes " -x M -y S \
        "Add pane (keep layout)" C-n "split-window ; select-layout" \
        "Split horizontal" | "split-window -h" \
        "Split vertical"   - "split-window -v" \
        "Zoom toggle"      z "resize-pane -Z" \
        "" \
        "Layout: even horizontal" M-1 "select-layout even-horizontal" \
        "Layout: even vertical"   M-2 "select-layout even-vertical" \
        "Layout: main horizontal" M-3 "select-layout main-horizontal" \
        "Layout: main vertical"   M-4 "select-layout main-vertical" \
        "Layout: tiled"           M-5 "select-layout tiled" \
        "Next layout"             Space "next-layout" \
        "" \
        "Rotate panes forward"    C-o "rotate-window -D" \
        "Rotate panes back"       M-o "rotate-window -U" \
        "" \
        "Send pane → (next window)"     > "join-pane -t :+ ; select-layout" \
        "Send pane ← (prev window)"     < "join-pane -t :- ; select-layout" \
        "Send pane to window #…"        g "command-prompt -p 'На окно №:' { join-pane -t ':%%' ; select-layout }" \
        "" \
        "Kill pane"        x "confirm-before -p 'kill pane? (y/n)' kill-pane"
    } {
      display-menu -T "#[align=centre] System " -x M -y S \
        "Reload config"   r "source-file ~/.tmux.conf ; display-message 'Config reloaded'" \
        "Copy mode"       c "copy-mode" \
        "Clock"           t "clock-mode" \
        "" \
        "Detach"          d "detach-client"
    }}}
  }
}