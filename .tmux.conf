set -g mouse on
set -g prefix C-s
set -g status on
set -g base-index 1
set -g pane-base-index 1

# Разрешить проброс escape-последовательностей (необходимо для Kitty протокола)
set -g allow-passthrough on

# Отключить визуальные уведомления (строго рекомендуется)
# Всплывающие уведомления активности tmux могут прерывать escape-коды и ломать отрисовку
set -g visual-activity off

bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xsel --clipboard --input"
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xsel --clipboard --input"
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xsel --clipboard --input"

set -g default-terminal "tmux-256color"
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

run ~/.tmux_plugins/catppuccin/catppuccin.tmux

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# run ~/.config/tmux/plugins/tmux-plugins/tmux-cpu/cpu.tmux
# run ~/.config/tmux/plugins/tmux-plugins/tmux-battery/battery.tmux

# ── Меню-бар ──────────────────────────────────────────────────────────────────
# Двухстрочный статус сверху: строка 0 — кликабельный меню-бар,
# строка 1 — обычный catppuccin (список окон + модули).
set -g status 2
set -g status-position top

# Строка 1: стандартный шаблон статуса (рендерит catppuccin). По умолчанию при
# `status 2` вторая строка показывает индексы панелей — переопределяем её.
set -g status-format[1] '#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?window_end_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?window_end_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]'

# Строка 0: меню-бар с кликабельными зонами (#[range=user|...]).
set -g status-format[0] "#[align=left fg=#{@thm_fg} bg=#{@thm_surface_0}]#[range=user|menu_sessions] Sessions #[norange]#[range=user|menu_windows] Windows #[norange]#[range=user|menu_panes] Panes #[norange]#[range=user|menu_system] System #[norange]"

# Стиль выпадающих меню в тон теме.
set -g menu-style          "fg=#{@thm_fg},bg=#{@thm_surface_0}"
set -g menu-selected-style "fg=#{@thm_crust},bg=#{@thm_mauve}"
set -g menu-border-style   "fg=#{@thm_overlay_0}"

# Клик по меню-бару (строка 0) открывает меню; клик по строке 1 — переключает окно.
bind -n MouseDown1Status {
  if -F "#{!=:#{mouse_status_line},0}" {
    select-window -t =
  } {
    if -F "#{==:#{mouse_status_range},menu_sessions}" {
      display-menu -T "#[align=centre] Sessions " -x M -y S \
        "New session"     n "command-prompt -p 'Session name:' { new-session -s '%%' }" \
        "Switch session"  s "choose-tree -Zs" \
        "Rename session"  r "command-prompt -I '#S' { rename-session '%%' }" \
        "" \
        "Detach"          d "detach-client" \
        "Kill session"    X "confirm-before -p 'kill session #S? (y/n)' kill-session"
    } {
    if -F "#{==:#{mouse_status_range},menu_windows}" {
      display-menu -T "#[align=centre] Windows " -x M -y S \
        "New window"      n "new-window" \
        "Next"            . "next-window" \
        "Previous"        , "previous-window" \
        "Rename"          r "command-prompt -I '#W' { rename-window '%%' }" \
        "" \
        "Kill window"     x "confirm-before -p 'kill window #W? (y/n)' kill-window"
    } {
    if -F "#{==:#{mouse_status_range},menu_panes}" {
      display-menu -T "#[align=centre] Panes " -x M -y S \
        "Split horizontal" h "split-window -h" \
        "Split vertical"   v "split-window -v" \
        "Zoom toggle"      z "resize-pane -Z" \
        "Next layout"      l "next-layout" \
        "" \
        "Kill pane"        x "confirm-before -p 'kill pane? (y/n)' kill-pane"
    } {
      display-menu -T "#[align=centre] System " -x M -y S \
        "Reload config"   r "source-file ~/.tmux.conf ; display-message 'Config reloaded'" \
        "Copy mode"       c "copy-mode" \
        "Clock"           t "clock-mode" \
        "" \
        "Detach"          d "detach-client"
    }}}
  }
}