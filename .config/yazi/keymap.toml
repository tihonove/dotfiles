# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.

"$schema" = "https://yazi-rs.github.io/schemas/keymap.json"

[[mgr.prepend_keymap]]
on   = "l"
run  = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

# ── Bookmarks ────────────────────────────────────────────────────────────────

[[mgr.prepend_keymap]]
on   = [ "m" ]
run  = "plugin bookmarks save"
desc = "Save current position as a bookmark"

[[mgr.prepend_keymap]]
on   = [ "'" ]
run  = "plugin bookmarks jump"
desc = "Jump to a bookmark"

[[mgr.prepend_keymap]]
on   = [ "b", "d" ]
run  = "plugin bookmarks delete"
desc = "Delete a bookmark"

[[mgr.prepend_keymap]]
on   = [ "b", "D" ]
run  = "plugin bookmarks delete_all"
desc = "Delete all bookmarks"

[[mgr.prepend_keymap]]
on = [ "y" ]
run = 'shell -- clippy %s'
desc = "Copy files via Clippy"

[[mgr.prepend_keymap]]
on = [ "p" ]
run = '''
    shell --confirm -- osascript -l JavaScript -e "
        ObjC.import('AppKit');
        ObjC.import('stdlib');
        var files = $.NSPasteboard.generalPasteboard.propertyListForType('NSFilenamesPboardType');
        if (files && files.count > 0) {
            for (var i = 0; i < files.count; i++) {
                var path = files.objectAtIndex(i).js;
                var quotedPath = \"\\\"\" + path.replace(/\\\"/g, \"\\\\\\\"\") + \"\\\"\";
                $.system(\"cp -R \" + quotedPath + \" .\");
            }
        }"
'''
desc = "Paste from macOS clipboard (JXA)"