# From .dotfiles

# ── Openers ──────────────────────────────────────────────────────────────────

[opener]
edit = [
	{ run = 'code %s', orphan = true, desc = "Open in VS Code" },
]
open = [
	{ run = 'open %s', orphan = true, desc = "Open (system default)", for = "macos" },
]
reveal = [
	{ run = 'open -R %s', orphan = true, desc = "Reveal in Finder", for = "macos" },
]
extract = [
	{ run = 'mkdir -p "${1%.*}" && ouch decompress "$1" --dir "${1%.*}"', desc = "Extract to subdirectory", for = "unix" },
]
list = [
	{ run = 'ouch list %s | less', block = true, desc = "List contents", for = "unix" },
]
execute = [
	{ run = 'printf "\033[1mExecute:\033[0m %s\n\n" "%s1" && read -p "Run? [y/N] " c && [[ $c == [yY] ]] && "%s1"', block = true, desc = "Execute (with confirmation)", for = "unix" },
]

# ── Open rules ───────────────────────────────────────────────────────────────

[open]
rules = [
	# Folders — open as project in VS Code
	{ url = "*/", use = [ "edit", "open", "reveal" ] },

	# ── Executable binaries ──
	{ mime = "application/x-executable",     use = [ "execute", "open", "reveal" ] },
	{ mime = "application/x-mach-binary",    use = [ "execute", "open", "reveal" ] },
	{ mime = "application/x-pie-executable", use = [ "execute", "open", "reveal" ] },
	{ mime = "application/x-elf",             use = [ "execute", "open", "reveal" ] },

	# ── Text / source code (text/* mime) ──
	{ mime = "text/*", use = [ "edit", "open" ] },

	# ── Structured data & scripts detected as application/* ──
	{ mime = "application/json",             use = [ "edit" ] },
	{ mime = "application/x-ndjson",         use = [ "edit" ] },
	{ mime = "application/javascript",       use = [ "edit" ] },
	{ mime = "application/typescript",       use = [ "edit" ] },
	{ mime = "application/x-shellscript",    use = [ "execute", "edit" ] },
	{ mime = "application/x-sh",             use = [ "execute", "edit" ] },
	{ mime = "application/xml",              use = [ "edit" ] },
	{ mime = "application/x-yaml",           use = [ "edit" ] },
	{ mime = "application/toml",             use = [ "edit" ] },
	{ mime = "application/x-ruby",           use = [ "execute", "edit" ] },
	{ mime = "application/x-perl",           use = [ "execute", "edit" ] },
	{ mime = "application/x-python",         use = [ "execute", "edit" ] },
	{ mime = "application/x-lua",            use = [ "execute", "edit" ] },
	{ mime = "application/x-empty",          use = [ "edit" ] },
	{ mime = "inode/x-empty",                use = [ "edit" ] },

	# ── Common extensions that may lack a mime ──
	{ url = "*.env",         use = [ "edit" ] },
	{ url = "*.env.*",       use = [ "edit" ] },
	{ url = ".editorconfig", use = [ "edit" ] },
	{ url = ".gitignore",    use = [ "edit" ] },
	{ url = "*.lock",        use = [ "edit" ] },
	{ url = "*.log",         use = [ "edit" ] },
	{ url = "*.sql",         use = [ "edit" ] },
	{ url = "*.graphql",     use = [ "edit" ] },
	{ url = "*.gql",         use = [ "edit" ] },
	{ url = "*.proto",       use = [ "edit" ] },
	{ url = "*.tf",          use = [ "edit" ] },
	{ url = "*.hcl",         use = [ "edit" ] },
	{ url = "Dockerfile*",   use = [ "edit" ] },
	{ url = "Makefile",      use = [ "edit" ] },
	{ url = "Justfile",      use = [ "edit" ] },
	{ url = "*.mk",          use = [ "edit" ] },

	# ── Media ──
	{ mime = "image/*", use = [ "open", "reveal" ] },
	{ mime = "video/*", use = [ "open", "reveal" ] },
	{ mime = "audio/*", use = [ "open", "reveal" ] },

	# ── Documents ──
	{ mime = "application/pdf",                                          use = [ "open", "reveal" ] },
	{ mime = "application/vnd.openxmlformats-officedocument.*",          use = [ "open", "reveal" ] },
	{ mime = "application/vnd.ms-excel",                                 use = [ "open", "reveal" ] },
	{ mime = "application/msword",                                       use = [ "open", "reveal" ] },
	{ mime = "application/vnd.oasis.opendocument.*",                     use = [ "open", "reveal" ] },

	# ── Archives ──
	{ mime = "application/zip",              use = [ "extract", "list", "reveal" ] },
	{ mime = "application/x-tar",            use = [ "extract", "list", "reveal" ] },
	{ mime = "application/x-bzip2",          use = [ "extract", "list", "reveal" ] },
	{ mime = "application/x-7z-compressed",  use = [ "extract", "list", "reveal" ] },
	{ mime = "application/x-rar",            use = [ "extract", "list", "reveal" ] },
	{ mime = "application/gzip",             use = [ "extract", "list", "reveal" ] },
	{ mime = "application/x-xz",            use = [ "extract", "list", "reveal" ] },
	{ mime = "application/zstd",             use = [ "extract", "list", "reveal" ] },

	# ── Fallback — всё остальное через системный open ──
	{ url = "*", use = [ "open", "reveal" ] },
]

[manager]
mouse_events = ["click", "scroll", "drag"]