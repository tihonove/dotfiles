# Конфиг ssh-киттена (kitten ssh) — читается автоматически при `kitten ssh <host>`.

# Пробрасывать сокет remote control kitty на удалённый хост, чтобы оттуда
# работал `kitten @`. Нужно для code-remote (открытие локального VSCode из
# ssh-сессии). По умолчанию выключено.
#
# ⚠ БЕЗОПАСНОСТЬ: это даёт удалённому хосту полный доступ к управлению локальным
# kitty — а через `kitten @ launch` и к запуску программ на локальной машине.
# Включай только для доверенных хостов. Чтобы ограничить конкретными хостами,
# оберни опцию в секцию `hostname <маска>` (см. docs ssh-киттена).
forward_remote_control yes
