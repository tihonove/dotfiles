# vim:ft=kitty

resize_in_steps yes

# ── Remote control (для «open terminal here» из yazi) ──
allow_remote_control yes
listen_on unix:/tmp/kitty

# ── Catppuccin Mocha ──────────────────────────────────────────────────────────

foreground              #cdd6f4
background              #1e1e2e
selection_foreground    #1e1e2e
selection_background    #f5e0dc

# Cursor
cursor                  #f5e0dc
cursor_text_color       #1e1e2e

# URL color
url_color               #f5e0dc

# Kitty window border
active_border_color     #b4befe
inactive_border_color   #6c7086
bell_border_color       #f9e2af

# Tab bar
active_tab_foreground   #11111b
active_tab_background   #cba6f7
inactive_tab_foreground #cdd6f4
inactive_tab_background #181825
tab_bar_background      #11111b

# The 16 terminal colors
# black
color0  #45475a
color8  #585b70
# red
color1  #f38ba8
color9  #f38ba8
# green
color2  #a6e3a1
color10 #a6e3a1
# yellow
color3  #f9e2af
color11 #f9e2af
# blue
color4  #89b4fa
color12 #89b4fa
# magenta
color5  #f5c2e7
color13 #f5c2e7
# cyan
color6  #94e2d5
color14 #94e2d5
# white
color7  #bac2de
color15 #a6adc8

map ctrl+shift+left no_op
map ctrl+shift+right no_op
map ctrl+shift+up no_op
map ctrl+shift+down no_op
map ctrl+shift+home no_op
map ctrl+shift+end no_op
map ctrl+tab no_op
map ctrl+shift+tab no_op
map ctrl+shift+e no_op
map ctrl+shift+p no_op

# ── Copy/paste работают и в русской раскладке ──────────────────────────────────
# kitty матчит шорткаты по символу текущей раскладки, поэтому дублируем биндинги
# на кириллицу тех же физических клавиш (ЙЦУКЕН: C→с, V→м, X→ч).
# физическая C → кириллица «с», физическая V → «м»
map ctrl+shift+с copy_to_clipboard
map ctrl+shift+м paste_from_clipboard

clipboard_control write-clipboard write-primary read-clipboard read-primary

# ── Super → tmux БЕЗ префикса ──────────────────────────────────────────────────
# tmux не умеет модификатор Super, поэтому kitty ловит Super-комбо и шлёт уникальные
# escape-последовательности, которые tmux привязан ловить в root-таблице
# (`bind -n User*`, см. ~/.tmux.conf — user-keys). Это просто байты в tty, поэтому
# работает и с локальным, и с удалённым tmux.
# ВНИМАНИЕ: на обычном десктопе часть Super-комбо (особенно Super+1..9, Super+C/N)
# может перехватывать оконный менеджер/DE до kitty — тогда их надо освободить
# в настройках рабочего окружения. В cage (киоск без WM) конфликтов нет.
# Super+o / Super+O — переход по панелям (как prefix o), next / prev.
map super+o          send_text all \x1b[210~
map super+щ          send_text all \x1b[210~
map super+shift+o    send_text all \x1b[211~
map super+shift+щ    send_text all \x1b[211~
# Super+Ctrl+o / Super+Ctrl+O — rotate панелей (как prefix C-o / M-o), вперёд / назад.
map super+ctrl+o         send_text all \x1b[230~
map super+ctrl+щ         send_text all \x1b[230~
map super+ctrl+shift+o   send_text all \x1b[231~
map super+ctrl+shift+щ   send_text all \x1b[231~
# Super+1..9 — переход на соответствующее окно.
map super+1 send_text all \x1b[221~
map super+2 send_text all \x1b[222~
map super+3 send_text all \x1b[223~
map super+4 send_text all \x1b[224~
map super+5 send_text all \x1b[225~
map super+6 send_text all \x1b[226~
map super+7 send_text all \x1b[227~
map super+8 send_text all \x1b[228~
map super+9 send_text all \x1b[229~
# Super+C — создать окно (дубль на кириллицу для RU-раскладки).
map super+c send_text all \x1b[232~
map super+с send_text all \x1b[232~
# Super+N / Super+P — переход по окнам (как prefix n / p); дубли на кириллицу.
map super+n send_text all \x1b[233~
map super+т send_text all \x1b[233~
map super+p send_text all \x1b[234~
map super+з send_text all \x1b[234~
# Super+Ctrl+N — новая панель (split) в текущем окне; дубль на кириллицу.
map super+ctrl+n send_text all \x1b[235~
map super+ctrl+т send_text all \x1b[235~
# Super+Alt+1..4 — выбор лейаута (even-h / even-v / main-h / main-v).
map super+alt+1 send_text all \x1b[241~
map super+alt+2 send_text all \x1b[242~
map super+alt+3 send_text all \x1b[243~
map super+alt+4 send_text all \x1b[244~

