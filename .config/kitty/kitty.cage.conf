# vim:ft=kitty
# Конфиг для запуска kitty в cage (kiosk).
# Запуск: cage -- kitty --config ~/.config/kitty/kitty.cage.conf

include kitty.conf

# --- Обход краша cage на правый клик -------------------------------------------
# Симптом: правый клик в панели с TUI, который включает mouse-reporting (Claude
# Code и т.п.), роняет всю cage-сессию (выброс в GDM). Причина — баг компоновщика
# cage 0.1.5 / wlroots: при правом клике дёргается Wayland-операция (обработка
# data-offer'ов буфера обмена), внутри которой `wl_list_remove` пишет по NULL →
# SIGSEGV в libwayland-server. См. ~/.cage-setup/README.md, раздел диагностики.
# Гасим правую кнопку ПОЛНОСТЬЮ (оба состояния grabbed+ungrabbed, все типы
# событий) через discard_event — kitty не делает локального действия и не
# пробрасывает событие в приложение, значит до Wayland-операции cage оно не дойдёт.
# Действует ТОЛЬКО в cage-сессии (этот файл). В обычном kitty правый клик как был.
# Откат: удалить этот блок и перелогиниться в cage.
mouse_map right            press       grabbed,ungrabbed discard_event
mouse_map right            release     grabbed,ungrabbed discard_event
mouse_map right            click       grabbed,ungrabbed discard_event
mouse_map right            doublepress grabbed,ungrabbed discard_event
mouse_map right            triplepress grabbed,ungrabbed discard_event
mouse_map right            doubleclick grabbed,ungrabbed discard_event
mouse_map right            tripleclick grabbed,ungrabbed discard_event
mouse_map shift+right      press       grabbed,ungrabbed discard_event
mouse_map ctrl+shift+right press       grabbed,ungrabbed discard_event
# ------------------------------------------------------------------------------

# Переключение между вкладками на Super+Ctrl+H/L
map super+ctrl+l next_tab
map super+ctrl+h  previous_tab
map super+ctrl+д next_tab
map super+ctrl+р  previous_tab

# Super → tmux БЕЗ префикса. tmux не умеет модификатор Super, поэтому kitty ловит
# Super-комбо и шлёт уникальные escape-последовательности, которые tmux привязан
# ловить в root-таблице (`bind -n User*`, см. ~/.tmux.conf — user-keys). Это просто
# байты в tty, поэтому работает и с локальным, и с удалённым tmux.
# Super+o / Super+O — переход по панелям (как prefix o), next / prev.
map super+o          send_text all \x1b[210~
map super+щ          send_text all \x1b[210~
map super+shift+o    send_text all \x1b[211~
map super+shift+щ    send_text all \x1b[211~
# Super+Ctrl+o / Super+Ctrl+O — rotate панелей (как prefix C-o / M-o), вперёд / назад.
map super+ctrl+o         send_text all \x1b[230~
map super+ctrl+щ         send_text all \x1b[230~
map super+ctrl+shift+o   send_text all \x1b[231~
map super+ctrl+shift+щ   send_text all \x1b[231~
# Super+1..9 — переход на соответствующее окно.
map super+1 send_text all \x1b[221~
map super+2 send_text all \x1b[222~
map super+3 send_text all \x1b[223~
map super+4 send_text all \x1b[224~
map super+5 send_text all \x1b[225~
map super+6 send_text all \x1b[226~
map super+7 send_text all \x1b[227~
map super+8 send_text all \x1b[228~
map super+9 send_text all \x1b[229~
# Super+C — создать окно (дубль на кириллицу для RU-раскладки).
map super+c send_text all \x1b[232~
map super+с send_text all \x1b[232~
# Super+N — новая панель (split) в текущем окне; дубль на кириллицу.
map super+n send_text all \x1b[233~
map super+т send_text all \x1b[233~
# Super+Alt+1..4 — выбор лейаута (even-h / even-v / main-h / main-v).
map super+alt+1 send_text all \x1b[241~
map super+alt+2 send_text all \x1b[242~
map super+alt+3 send_text all \x1b[243~
map super+alt+4 send_text all \x1b[244~
