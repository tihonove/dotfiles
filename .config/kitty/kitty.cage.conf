# vim:ft=kitty
# Конфиг для запуска kitty в cage (kiosk).
# Запуск: cage -- kitty --config ~/.config/kitty/kitty.cage.conf

include kitty.conf

# Переключение между вкладками kitty на Super+Ctrl+H/L (cage-специфика: в cage
# используются нативные табы kitty; дубли на кириллицу для RU-раскладки).
map super+ctrl+l next_tab
map super+ctrl+h  previous_tab
map super+ctrl+д next_tab
map super+ctrl+р  previous_tab

# Super → tmux мапы (Super+o, Super+1..9, Super+C/N/P, Super+Alt+1..4 …) теперь
# живут в kitty.conf и подключаются через `include kitty.conf` выше — работают и в
# cage, и в обычном kitty. См. подробности и предупреждение про перехват WM там.
